# Application
spring.application.name=dashboard-finance
app.version=1.0.0

# Default active profile — override via SPRING_PROFILES_ACTIVE env var in Docker/prod
spring.profiles.active=local

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# springdoc-openapi (Swagger UI) — T026/US2
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true

# JWT configuration
app.jwt.secret=${APP_JWT_SECRET:dGhpc2lzYXZlcnlsb25nYW5kc2VjdXJlc2VjcmV0a2V5Zm9yamRhc2hib2FyZGZpbmFuY2UyMDI2}
app.jwt.expiration-hours=${APP_JWT_EXPIRATION_HOURS:8}

# Admin seed account — initial password set from env var
app.admin.initial-password=${APP_ADMIN_INITIAL_PASSWORD:}
